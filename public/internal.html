<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<title>Dashboard Internal Rusun</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
.badge{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600}
.badge-terisi{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.4)}
.badge-rusak{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.4)}
.badge-siap{background:rgba(234,179,8,.15);color:#eab308;border:1px solid rgba(234,179,8,.4)}
.menu-link{display:block;padding:8px 10px;border-radius:8px}
.menu-link:hover{background:#020617}
.pagination button{padding:6px 12px;margin:0 2px;border-radius:8px;border:1px solid #334155;background:#020617;color:white}
.pagination button.active{background:#2563eb;border-color:#2563eb}
.pagination button:disabled{opacity:.4}
#sidebar.collapsed{width:80px}
#sidebar.collapsed .menu-text{display:none}
#sidebar.collapsed h1{font-size:0}
#sidebar.collapsed h1:after{content:"🏠";font-size:22px}

/* ===== UI ONLY OVERRIDES (NO LOGIC / NO STRUCTURE CHANGED) ===== */
.grid-cols-2{grid-template-columns:160px 1fr}
.tabular-nums{font-variant-numeric:tabular-nums}
/* ============================================================= */


/* ===== UI ADD-ONLY: ADMINISTRASI + PERJANJIAN COMPOSITION ===== */
.section-like-status {
  background: linear-gradient(180deg, rgba(15,23,42,.85), rgba(2,6,23,.9));
  border-radius: 1rem;
  padding: 1rem;
}
.admin-wrapper {
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.perjanjian-card {
  background: rgba(15,23,42,.9);
  border: 1px solid rgba(51,65,85,.6);
  border-radius: .75rem;
  padding: .75rem;
}
.perjanjian-label {
  font-size: .75rem;
  color: #94a3b8;
  margin-bottom: .5rem;
}
/* Hide big header visually, keep in DOM */
.hide-section-title > h3 {
  display: none;
}
/* ============================================================= */

/* ===== MODE PDF MINIMALIS ===== */
.pdf-mode {
  background: white !important;
  color: #111827 !important;
}

.pdf-mode .bg-slate-800,
.pdf-mode .bg-slate-900,
.pdf-mode .bg-slate-800\/60,
.pdf-mode .bg-slate-950,
.pdf-mode .section-like-status,
.pdf-mode .perjanjian-card {
  background: white !important;
  border: 1px solid #e5e7eb !important;
}

.pdf-mode h3,
.pdf-mode h4 {
  color: #1E3A8A !important;
}

.pdf-mode .text-blue-400 {
  color: #1E3A8A !important;
}

.pdf-mode .text-slate-400,
.pdf-mode .text-slate-500 {
  color: #6B7280 !important;
}

.pdf-mode table {
  background: white !important;
  color: #111827 !important;
}

.pdf-mode thead {
  background: #F1F5F9 !important;
}

.pdf-mode .badge {
  border: none !important;
}
/* =============================== */
</style>
</head>

<body class="bg-slate-950 text-white">

<script>
if(sessionStorage.getItem("RUSUN_LOGIN")!=="OK"){
  location.replace("/login.html");
}
</script>

<div class="flex min-h-screen">

<div id="sidebar" class="w-64 bg-slate-900 p-5 flex flex-col transition-all duration-300">
  <h1 class="text-xl font-bold mb-6">RUSUN DASHBOARD</h1>
  <a class="menu-link text-slate-200"><span class="menu-text">Manajemen Penghuni</span></a>
  <a href="/pdam.html" target="_blank" class="menu-link text-blue-400 font-semibold"><span class="menu-text">Data Meter PDAM</span></a>
  <a href="https://kk-terima-2026.vercel.app/" target="_blank" class="menu-link text-slate-300"><span class="menu-text">KK Sewa 2026</span></a>
  <a href="https://tgk-rusun-2026.vercel.app/" target="_blank" class="menu-link text-slate-300"><span class="menu-text">Tunggakan 2026</span></a>
  <div class="mt-auto">
    <a onclick="logout()" class="text-red-400 cursor-pointer menu-text">Logout</a>
  </div>
</div>

<div class="flex-1 p-8">

<div class="flex items-center gap-4 mb-6">
  <button onclick="toggleSidebar()" class="bg-slate-800 px-3 py-2 rounded-lg hover:bg-slate-700">☰</button>
  <h2 class="text-2xl font-bold">Dashboard Internal</h2>
</div>

<div class="grid grid-cols-4 gap-4 mb-8">
  <div class="bg-slate-800 p-4 rounded">Penghuni<br><b id="penghuni">-</b></div>
  <div class="bg-slate-800 p-4 rounded">Unit Terisi<br><b id="unitTerisi">-</b></div>
  <div class="bg-slate-800 p-4 rounded">Total Bayar<br><b id="totalBayar">Rp 0</b></div>
  <div class="bg-slate-800 p-4 rounded">Total Tunggakan<br><b id="totalTunggakan">Rp 0</b></div>
</div>

<div class="bg-slate-900 rounded p-5">
<h3 class="font-bold mb-4">Daftar Penghuni</h3>

<div class="flex gap-3 mb-4">
  <input id="searchInput" placeholder="Cari unit / nama..." class="flex-1 p-2 bg-slate-800 rounded">
  <select id="statusFilter" class="p-2 bg-slate-800 rounded">
      <option value="">Semua Status</option>
    <option value="TERISI">Terisi</option>
    <option value="RUSAK">Rusak</option>
    <option value="SIAP">Siap Huni</option>
  </select>

  <select id="tunggakanFilter" class="p-2 bg-slate-800 rounded">
      <option value="">Semua Keuangan</option>
      <option value="SEWA">Tunggakan Sewa</option>
      <option value="PDAM">Tunggakan PDAM</option>
      <option value="SAMPAH">Tunggakan Sampah</option>
      <option value="ADA">Ada Tunggakan Apapun</option>
  </select>
</div>

<table class="w-full text-sm">
<thead class="border-b border-slate-700">
<tr>
<th class="py-2 text-left">Unit</th>
<th class="py-2 text-left">Nama</th>
<th class="py-2 text-left">Status</th>
<th class="py-2 text-left">Total Bayar</th>
<th class="py-2 text-left">Total Tunggakan</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<div id="pagination" class="pagination mt-4"></div>
</div>
</div>
</div>

<!-- MODAL DETAIL -->
<div id="modal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50">
<div class="bg-slate-900 max-w-6xl w-full rounded-2xl p-6 overflow-y-auto max-h-[90vh]">

<div class="flex justify-between items-center mb-4">
  <h2 id="judulDetail" class="text-xl font-bold">Detail Penghuni</h2>
  <div class="flex gap-3">
    <button onclick="exportPDF()" 
      class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm">
      Export PDF
    </button>
    <button onclick="closeModal()" 
      class="text-red-400 font-bold">
      ✖ Tutup
    </button>
  </div>
</div>

<div id="detailBox" class="space-y-6"></div>

</div>
</div>

<script>
function toggleSidebar(){ sidebar.classList.toggle("collapsed"); }
function logout(){ sessionStorage.clear(); location.href="/login.html"; }

const penghuni=document.getElementById("penghuni"),
unitTerisi=document.getElementById("unitTerisi"),
totalBayar=document.getElementById("totalBayar"),
totalTunggakan=document.getElementById("totalTunggakan"),
tbody=document.getElementById("tbody"),
searchInput=document.getElementById("searchInput"),
statusFilter=document.getElementById("statusFilter"),
tunggakanFilter=document.getElementById("tunggakanFilter"),
pagination=document.getElementById("pagination"),
modal=document.getElementById("modal"),
detailBox=document.getElementById("detailBox"),
judulDetail=document.getElementById("judulDetail");

let allData=[],filteredData=[],currentPage=1,rowsPerPage=25,currentDetail=null;

async function loadData(){
  const res=await fetch("/api/data?action=internal&key=rusun2026",{headers:{"X-Requested-With":"XMLHttpRequest"}});
  const json=await res.json();
  const sum=json.data.summary,data=json.data.data;
  penghuni.innerText=sum.penghuni;
  unitTerisi.innerText=sum.terisi;
  totalBayar.innerText="Rp "+Number(sum.totalBayar).toLocaleString("id-ID");
  totalTunggakan.innerText="Rp "+Number(sum.totalTunggakan).toLocaleString("id-ID");
  allData=data;filteredData=data;renderTable();
}

function badgeStatus(status){
  if(!status) return "-";
  const s=status.toLowerCase();
  if(s.includes("terisi")) return `<span class="badge badge-terisi">TERISI</span>`;
  if(s.includes("rusak")) return `<span class="badge badge-rusak">RUSAK</span>`;
  if(s.includes("siap")) return `<span class="badge badge-siap">SIAP HUNI</span>`;
  return status;
}

function applyFilter(){

const search = searchInput.value.toLowerCase();
const status = statusFilter.value;
const tunggakan = tunggakanFilter.value;

filteredData = allData.filter(d=>{

const unit=(d.unit||"").toLowerCase();
const nama=(d.nama||"").toLowerCase();
const st=(d.kondisiunit||"").toUpperCase();

let cocokSearch = unit.includes(search) || nama.includes(search);
let cocokStatus = !status || st.includes(status);

let sewa = Number(d.tunggakan||0) > 0;

let pdam = d.pdamSampah && Number(d.pdamSampah["total pdam"]||0) > 0;

let sampah = d.pdamSampah && Number(d.pdamSampah["total sampah"]||0) > 0;

let cocokTunggakan = true;

if(tunggakan==="SEWA") cocokTunggakan = sewa;
if(tunggakan==="PDAM") cocokTunggakan = pdam;
if(tunggakan==="SAMPAH") cocokTunggakan = sampah;
if(tunggakan==="ADA") cocokTunggakan = sewa || pdam || sampah;

return cocokSearch && cocokStatus && cocokTunggakan;

});

currentPage=1;
renderTable();
}

function renderTable(){
  tbody.innerHTML="";
  const start=(currentPage-1)*rowsPerPage;
  filteredData.slice(start,start+rowsPerPage).forEach(d=>{
    tbody.innerHTML+=`
    <tr class="border-b border-slate-800 hover:bg-slate-800">
      <td class="py-1 uppercase text-blue-400 cursor-pointer font-bold data-unit"
    data-unit="${d.unit}">
    ${d.unit}
</td>
      <td>${d.nama}</td>
      <td>${badgeStatus(d.kondisiunit)}</td>
      <td>Rp ${Number(d.pembayaran).toLocaleString("id-ID")}</td>
      <td>Rp ${Number(d.tunggakan).toLocaleString("id-ID")}</td>
    </tr>`;
  });

document.querySelectorAll(".data-unit").forEach(el=>{
  el.onclick = () => openDetailByUnit(el.dataset.unit);
});

  renderPagination();
}

function openDetailByUnit(unit){
  const data = allData.find(x => x.unit === unit);
  if(!data){
    alert("Data tidak ditemukan");
    return;
  }
  openDetail(data);
}

function renderPagination(){
  pagination.innerHTML="";
  const totalPage=Math.ceil(filteredData.length/rowsPerPage);
  const prev=document.createElement("button");
  prev.textContent="Prev";
  prev.disabled=currentPage===1;
  prev.onclick=()=>{currentPage--;renderTable();};
  pagination.appendChild(prev);

  for(let i=1;i<=totalPage;i++){
    const b=document.createElement("button");
    b.textContent=i;
    if(i===currentPage)b.classList.add("active");
    b.onclick=()=>{currentPage=i;renderTable();};
    pagination.appendChild(b);
  }

  const next=document.createElement("button");
  next.textContent="Next";
  next.disabled=currentPage===totalPage;
  next.onclick=()=>{currentPage++;renderTable();};
  pagination.appendChild(next);
}

function section(title,content){
  return `<div class="bg-slate-800/60 p-4 rounded-xl">
    <h3 class="font-bold text-blue-400 mb-3">${title}</h3>${content}</div>`;
}

function gridRow(label,val){
  return `
    <div class="text-[11px] uppercase tracking-wide text-slate-500">
      ${label}
    </div>
    <div class="text-slate-100 font-medium leading-relaxed">
      ${val||"-"}
    </div>
  `;
}

function anggotaCard(title,o){
  if(!o.nama) return "";
  return `<div class="bg-slate-800 p-4 rounded-xl">
    <h4 class="font-bold text-blue-400 mb-2">${title}</h4>
    <div class="grid grid-cols-2 gap-2 text-sm">
      ${gridRow("Nama",o.nama)}
      ${gridRow("NIK",o.nik)}
      ${gridRow("Jenis Kelamin",o.jk)}
      ${gridRow("TTL",fmtTanggal(o.ttl))}
      ${gridRow("Umur",o.umur)}
      ${gridRow("Status",o.status)}
      ${gridRow("Disabilitas",o.disabilitas)}
    </div></div>`;
}

function fmtTanggal(val){
  if(!val) return "-";
  const d=new Date(val);
  if(isNaN(d)) return val;
  return d.toLocaleDateString("id-ID",{day:"2-digit",month:"2-digit",year:"numeric"});
}

function kontrakBadge(val){
  if(!val) return "";
  const end=new Date(val);
  if(isNaN(end)) return "";
  const now=new Date();
  const diff=Math.ceil((end-now)/(1000*60*60*24));
  if(diff<0) return '<span class="badge badge-rusak ml-2">HABIS</span>';
  if(diff<=30) return '<span class="badge badge-siap ml-2">AKAN HABIS ('+diff+' hari)</span>';
  return "";
}

/* ===== TAMBAHAN BARU: RIWAYAT PERJANJIAN ===== */
function renderRiwayatPerjanjian(list){
  if(!Array.isArray(list)||list.length===0){
    return `<div class="text-slate-400 text-sm italic">Belum ada data perjanjian</div>`;
  }
  const head=Object.keys(list[0]);
  let th=head.map(h=>`<th class="px-3 py-2 text-left">${h}</th>`).join("");
  let rows=list.map(o=>{
    return `<tr class="border-b border-slate-700/50">`+
      head.map(h=>{
        let v=o[h];
        if(String(h).toLowerCase().includes("tgl")) v=fmtTanggal(v);
        if(String(h).toLowerCase()==="status"){
          const s=String(v).toUpperCase();
          let c="bg-slate-700";
          if(s==="AKTIF") c="bg-green-600/20 text-green-400";
          if(s==="NONAKTIF") c="bg-slate-600/20 text-slate-300";
          if(s==="HABIS") c="bg-red-600/20 text-red-400";
          return `<td class="px-3 py-2"><span class="px-2 py-1 rounded ${c}">${v}</span></td>`;
        }
        return `<td class="px-3 py-2">${v||"-"}</td>`;
      }).join("")+
    `</tr>`;
  }).join("");
  return `<div class="overflow-auto">
    <table class="w-full text-sm">
      <thead class="sticky top-0 bg-slate-800"><tr>${th}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}


/* ===== TAMBAHAN BARU: RIWAYAT PENGHUNI DETAIL (TABLE + HIGHLIGHT) ===== */
function statusClassByNama(nama){
  if(!nama) return "text-slate-200";
  const s = String(nama).toLowerCase();
  if(s.includes("(keluar)")) return "text-red-400 font-semibold";
  if(s.includes("(dalam pengawasan)")) return "text-amber-400 font-semibold";
  return "text-slate-200";
}

function formatRupiah(n){
  const num = Number(n||0);
  return "Rp " + num.toLocaleString("id-ID");
}

function renderRiwayatPenghuniDetailTable(list){
  if(!Array.isArray(list) || list.length===0){
    return `<div class="text-slate-400 text-sm italic">Belum ada riwayat detail penghuni</div>`;
  }
  return `
  <div class="overflow-x-auto border border-slate-800 rounded-lg">
    <table class="min-w-full text-xs md:text-sm">
      <thead class="bg-slate-900 border-b border-slate-800">
        <tr class="text-slate-400">
          <th class="px-3 py-2 text-left">Nama</th>
        </tr>
      </thead>
      <tbody>
        ${list.map((d,i)=>`
          <tr class="${i%2?'bg-slate-900':'bg-slate-950'} border-b border-slate-800">
            <td class="px-3 py-2 ${statusClassByNama(d.nama)}">${d.nama||'-'}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  </div>
  `;
}

function renderRiwayatTunggakan(list){
  if(!Array.isArray(list) || list.length===0){
    return `<div class="text-slate-400 text-sm italic">Belum ada riwayat tunggakan</div>`;
  }
  return `
  <div class="overflow-x-auto border border-slate-800 rounded-lg">
    <table class="min-w-full text-xs md:text-sm">
      <thead class="bg-slate-900 border-b border-slate-800">
        <tr class="text-slate-400">
          <th class="px-3 py-2 text-left">Nama</th>
          <th class="px-3 py-2 text-left">Jumlah Bulan 2024</th>
          <th class="px-3 py-2 text-right">Jumlah Uang 2024</th>
          <th class="px-3 py-2 text-left">Jumlah Bulan 2025</th>
          <th class="px-3 py-2 text-right">Jumlah Uang 2025</th>
          <th class="px-3 py-2 text-left">Jumlah Bulan 2026</th>
          <th class="px-3 py-2 text-right">Jumlah Uang 2026</th>
        </tr>
      </thead>
      <tbody>
        ${list.map((d,i)=>`
          <tr class="${i%2?'bg-slate-900':'bg-slate-950'} border-b border-slate-800">
            <td class="px-3 py-2 ${statusClassByNama(d.nama)}">${d.nama||'-'}</td>
            <td class="px-3 py-2 text-slate-300">${d.bulan_tunggak_24||''}</td>
            <td class="px-3 py-2 text-right text-slate-300">${formatRupiah(d.uang_tunggak_24)}</td>
            <td class="px-3 py-2 text-slate-300">${d.bulan_tunggak_25||''}</td>
            <td class="px-3 py-2 text-right text-slate-300">${formatRupiah(d.uang_tunggak_25)}</td>
            <td class="px-3 py-2 text-slate-300">${d.bulan_tunggak_26||''}</td>
            <td class="px-3 py-2 text-right text-slate-300">${formatRupiah(d.uang_tunggak_26)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  </div>
  `;
}

/* ===== ADD ONLY: RIWAYAT PEMBAYARAN ===== */
function renderRiwayatPembayaran(list){
  if(!Array.isArray(list) || list.length===0){
    return `<div class="text-slate-400 text-sm italic">Belum ada riwayat pembayaran</div>`;
  }
  return `
  <div class="overflow-x-auto border border-slate-800 rounded-lg">
    <table class="min-w-full text-xs md:text-sm">
      <thead class="bg-slate-900 border-b border-slate-800">
        <tr class="text-slate-400">
          <th class="px-3 py-2 text-left">Tanggal</th>
          <th class="px-3 py-2 text-left">Ref IBB</th>
          <th class="px-3 py-2 text-left">Periode 2025</th>
          <th class="px-3 py-2 text-left">Periode 2026</th>
          <th class="px-3 py-2 text-right">Jumlah</th>
        </tr>
      </thead>
      <tbody>
        ${list.map((d,i)=>`
          <tr class="${i%2?'bg-slate-900':'bg-slate-950'} border-b border-slate-800">
            <td class="px-3 py-2">${fmtTanggal(d.tanggal)}</td>
            <td class="px-3 py-2">${d.ref||'-'}</td>
            <td class="px-3 py-2">${d.periode2025||'-'}</td>
            <td class="px-3 py-2">${d.periode2026||'-'}</td>
            <td class="px-3 py-2 text-right">${formatRupiah(d.jumlah)}</td>
          </tr>
        `).join("")}
      </tbody>
    </table>
  </div>`;
}
/* ========================================= */

function renderRiwayatPdamSampah(o){

if(!o){
return `<div class="text-slate-400 text-sm italic">
Belum ada data PDAM / Sampah
</div>`;
}

function rupiah(v){
return "Rp " + Number(v||0).toLocaleString("id-ID");
}

return `

<div class="space-y-6">

<div>

<div class="text-slate-400 text-sm mb-2">PDAM</div>

<div class="overflow-x-auto border border-slate-800 rounded-lg">
<table class="min-w-full text-xs md:text-sm">

<thead class="bg-slate-900 border-b border-slate-800">
<tr class="text-slate-400">
<th class="px-3 py-2 text-left">Tahun</th>
<th class="px-3 py-2 text-left">Jumlah Bulan</th>
<th class="px-3 py-2 text-right">Jumlah Uang</th>
</tr>
</thead>

<tbody>

<tr class="border-b border-slate-800">
<td class="px-3 py-2">2024</td>
<td class="px-3 py-2">${o["pdam jlh bln 2024"]||"-"}</td>
<td class="px-3 py-2 text-right">${rupiah(o["pdam jlh uang 2024"])}</td>
</tr>

<tr class="border-b border-slate-800">
<td class="px-3 py-2">2025</td>
<td class="px-3 py-2">${o["pdam jlh bln 2025"]||"-"}</td>
<td class="px-3 py-2 text-right">${rupiah(o["pdam jlh uang 2025"])}</td>
</tr>

<tr class="border-b border-slate-800">
<td class="px-3 py-2">2026</td>
<td class="px-3 py-2">${o["pdam jlh bln 2026"]||"-"}</td>
<td class="px-3 py-2 text-right">${rupiah(o["pdam jlh uang 2026"])}</td>
</tr>

<tr class="bg-slate-900 font-semibold">
<td class="px-3 py-2">TOTAL</td>
<td></td>
<td class="px-3 py-2 text-right">${rupiah(o["total pdam"])}</td>
</tr>

</tbody>
</table>
</div>

</div>


<div>

<div class="text-slate-400 text-sm mb-2">SAMPAH</div>

<div class="overflow-x-auto border border-slate-800 rounded-lg">
<table class="min-w-full text-xs md:text-sm">

<thead class="bg-slate-900 border-b border-slate-800">
<tr class="text-slate-400">
<th class="px-3 py-2 text-left">Tahun</th>
<th class="px-3 py-2 text-left">Jumlah Bulan</th>
<th class="px-3 py-2 text-right">Jumlah Uang</th>
</tr>
</thead>

<tbody>

<tr class="border-b border-slate-800">
<td class="px-3 py-2">2024</td>
<td class="px-3 py-2">${o["sampah jlh bln 2024"]||"-"}</td>
<td class="px-3 py-2 text-right">${rupiah(o["sampah jlh uang 2024"])}</td>

function exportPDF(){

const d = currentDetail;
if(!d){
alert("Data tidak ditemukan");
return;
}

  const cetakTanggal = new Date().toLocaleDateString("id-ID");

  /* =========================
     PARSING LOGIKA RUSUN
  ========================== */

  const unitUpper = d.unit.toUpperCase();

  let rusunawa = "-";
  if(unitUpper.startsWith("GM")) rusunawa = "RUSUNAWA GANDA MAGHFIRAH";
  if(unitUpper.startsWith("TK")) rusunawa = "RUSUNAWA TELUK KELAYAN";

  let blok = "-";
  let lantai = "-";
  let noUnit = "-";

  const match = unitUpper.match(/^[A-Z]+-([A-Z])(\d+)\.(\d+)/);

  if(match){
    blok = "Blok " + match[1];
    lantai = match[2];
    noUnit = match[3];
  }

  /* =========================
     CONTAINER PDF
  ========================== */

  const el = document.createElement("div");
  el.style.fontFamily = "Arial";
  el.style.fontSize = "11px";
  el.style.color = "#000";
  el.style.padding = "20px";

  el.innerHTML = `
  <div style="text-align:center;font-size:18px;font-weight:bold;margin-bottom:15px;">
    DATA PENGHUNI
  </div>

  <!-- BLOK RUSUN -->
  <table width="100%" border="1" cellspacing="0" cellpadding="5" style="margin-bottom:8px;">
    <tr><td width="30%">Rusunawa</td><td>${rusunawa}</td></tr>
    <tr><td>Type</td><td>${d.type || "-"}</td></tr>
    <tr><td>Blok</td><td>${blok}</td></tr>
    <tr><td>Lantai</td><td>${lantai}</td></tr>
    <tr><td>No Sarusunawa</td><td>${noUnit}</td></tr>
  </table>

  <!-- TARIF -->
  <table width="100%" border="1" cellspacing="0" cellpadding="5" style="margin-bottom:8px;">
    <tr><td width="40%">Tarif sewa per bulan</td><td>Rp ${Number(d.tarif||0).toLocaleString("id-ID")}</td></tr>
    <tr><td>Uang Jaminan</td><td>Rp ${Number(d.jaminan||0).toLocaleString("id-ID")}</td></tr>
  </table>

  <!-- ADMINISTRASI -->
  <table width="100%" border="1" cellspacing="0" cellpadding="5" style="margin-bottom:8px;">
    <tr><td>Pendaftaran</td><td>${d.no_daftar_formulir||'-'}</td></tr>
    <tr><td>Penetapan</td><td>${d.no_penetapan_calon_penghuni||'-'}</td></tr>
    <tr><td>Surat Izin Tinggal</td><td>${d.no_izin_penghuni||'-'}</td></tr>
    <tr><td>Perjanjian</td><td>${(d.riwayatPerjanjian?.[0]?.no_perjanjian_penghuni)||'-'}</td></tr>
    <tr><td>Tanggal Berakhir</td><td>${fmtTanggal(d.riwayatPerjanjian?.[0]?.tgl_perjanjian_akhir_penghuni)}</td></tr>
  </table>

  <!-- IDENTITAS -->
  <table width="100%" border="1" cellspacing="0" cellpadding="5" style="margin-bottom:8px;">
    <tr><td width="5%">1</td><td width="35%">Nama Penghuni</td><td>${d.nama||'-'}</td></tr>
    <tr><td>2</td><td>NIK Penghuni</td><td>${d.nik||'-'}</td></tr>
    <tr><td>3</td><td>Tempat Tanggal Lahir</td><td>${fmtTanggal(d.ttl)}</td></tr>
    <tr><td>4</td><td>Agama</td><td>${d.agama||'-'}</td></tr>
    <tr><td>5</td><td>Status Perkawinan</td><td>${d.statusPerkawinan||'-'}</td></tr>
    <tr><td>6</td><td>Alamat</td><td>${d.alamat||'-'}</td></tr>
    <tr><td>7</td><td>Status Tempat Tinggal</td><td>${d.statusTempatTinggal||'-'}</td></tr>
    <tr><td>8</td><td>Pekerjaan</td><td>${d.pekerjaan||'-'}</td></tr>
    <tr><td>9</td><td>Penghasilan</td><td>${d.penghasilan||'-'}</td></tr>
    <tr><td>10</td><td>Pekerjaan Istri/Suami</td><td>${d.pekerjaanPasangan||'-'}</td></tr>
    <tr><td>11</td><td>Penghasilan Istri/Suami</td><td>${d.penghasilanPasangan||'-'}</td></tr>
    <tr><td>12</td><td>Total Penghasilan</td><td>${d.totalPenghasilan||'-'}</td></tr>
    <tr><td>13</td><td>Nomor Telp./HP</td><td>${d.telp||'-'}</td></tr>
    <tr><td>14</td><td>Email</td><td>${d.email||'-'}</td></tr>
  </table>

  <!-- ANGGOTA KELUARGA -->
  <div style="font-weight:bold;margin:10px 0;">Data Anggota Keluarga</div>
  <table width="100%" border="1" cellspacing="0" cellpadding="5">
    <tr>
      <th>Nama</th>
      <th>NIK</th>
      <th>Jenis Kelamin</th>
      <th>Umur</th>
      <th>Status</th>
    </tr>
    ${[1,2,3,4].map(i=>{
      if(!d["anggota"+i]) return "";
      return `
        <tr>
          <td>${d["anggota"+i]}</td>
          <td>${d["nik"+i]||''}</td>
          <td>${d["jk"+i]||''}</td>
          <td>${d["umur"+i]||''}</td>
          <td>${d["status"+i]||''}</td>
        </tr>
      `;
    }).join("")}
  </table>

  <div style="page-break-before:always;"></div>

  <!-- DATA PENJAMIN -->
  <div style="font-weight:bold;margin-bottom:8px;">20. Data Penjamin</div>
  <table width="100%" border="1" cellspacing="0" cellpadding="5">
    <tr><td width="40%">Nama Penjamin</td><td>${d.penjamin||'-'}</td></tr>
    <tr><td>NIK</td><td>${d.nikPenjamin||'-'}</td></tr>
    <tr><td>Alamat</td><td>${d.alamatPenjamin||'-'}</td></tr>
    <tr><td>Pekerjaan</td><td>${d.statusPenjamin||'-'}</td></tr>
    <tr><td>Nomor Telp./HP</td><td>${d.telpPenjamin||'-'}</td></tr>
  </table>

  <div style="margin-top:20px;font-size:10px;">
    Hal. 1/2 | Dicetak pada tanggal ${cetakTanggal}
  </div>
  `;

  html2pdf().set({
    margin:10,
    filename:"DATA_PENGHUNI_"+d.unit+".pdf",
    html2canvas:{scale:2},
    jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
  }).from(el).save();
}
